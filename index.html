<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人飲食紀錄系統</title>
<style>
:root{--bg:#f6f4ef;--card:#fffaf3;--ink:#2d2a26;--muted:#756f66;--line:#e8dfd2;--accent:#a86f3d;--accent2:#d7a86e;--green:#2f8f62;
--yellow:#b68413;--red:#c64b3c;--shadow:0 12px 32px rgba(65,45,25,.10);--radius:18px}*{box-sizing:border-box}body{margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#fbf7ef
0%,var(--bg) 100%);color:var(--ink)}header{position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);background:rgba(246,244,239,.9);
border-bottom:1px solid var(--line)}.wrap{max-width:1220px;margin:0 auto;padding:16px}.hero{display:flex;align-items:center;
justify-content:space-between;gap:12px}h1{font-size:22px;margin:0}.sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}.pill{
background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;color:var(--muted);white-space:nowrap}
nav{display:flex;gap:8px;overflow:auto;padding:10px 16px 14px;max-width:1220px;margin:0 auto}.tab{border:1px solid var(--line);background:#fff;
border-radius:999px;padding:9px 13px;color:#4e463f;white-space:nowrap;cursor:pointer;font-weight:700;font-size:14px}.tab.active{
background:var(--accent);color:white;border-color:var(--accent)}main{max-width:1220px;margin:0 auto;padding:16px}.panel{display:none}
.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(255,250,243,.96);border:1px
solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}.col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{
grid-column:span 6}.col-7{grid-column:span 7}.col-8{grid-column:span 8}.col-12{grid-column:span 12}h2{font-size:18px;margin:0 0 12px}h3{
font-size:15px;margin:14px 0 10px;color:#5c4630}.hint{font-size:12px;color:var(--muted);line-height:1.55}.row{display:grid;
grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.row4{display:grid;
grid-template-columns:repeat(4,1fr);gap:10px}label{display:block;font-size:12px;font-weight:700;color:#5d554d;margin-bottom:6px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:10px 11px;background:#fff;color:var(--ink);
font-size:15px}textarea{min-height:80px;resize:vertical}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{border:0;
border-radius:13px;padding:10px 13px;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}.btn.secondary{background:#fff;
color:var(--accent);border:1px solid var(--line)}.btn.danger{background:#c64b3c;color:#fff}.btn.small{font-size:12px;padding:7px 9px;
border-radius:10px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{background:#fff;border:1px solid var(--line);
border-radius:16px;padding:12px}.metric .num{font-size:20px;font-weight:900;margin-top:5px}.metric .cap{font-size:12px;color:var(--muted)}.good{
color:var(--green);font-weight:900}.warn{color:var(--yellow);font-weight:900}.bad{color:var(--red);font-weight:900}table{width:100%;
border-collapse:separate;border-spacing:0 8px}th{font-size:12px;color:var(--muted);text-align:left;padding:0 8px;white-space:nowrap}td{
background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px 8px;vertical-align:top;font-size:13px}
td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}td:last-child{border-right:1px solid var(--line);border-radius:0
12px 12px 0}.foodpic{width:54px;height:54px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}.empty{padding:26px;
text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px;background:#fff}.filterbar{display:flex;gap:8px;
flex-wrap:wrap;align-items:end;margin-bottom:10px}.filterbar>div{min-width:145px}.list{display:flex;flex-direction:column;gap:10px}.dayitem{
background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.daytop{display:flex;justify-content:space-between;gap:10px;
align-items:center}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:12px;background:#f6eee3;border:1px solid
var(--line);border-radius:999px;padding:4px 8px}.note{background:#fff7e9;border:1px solid #ead5b8;border-radius:14px;padding:10px;color:#5a4125;
font-size:13px;line-height:1.55}.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}.toast{
position:fixed;right:16px;bottom:16px;background:#2d2a26;color:white;padding:12px 14px;border-radius:14px;box-shadow:var(--shadow);z-index:99;
opacity:0;transform:translateY(8px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:860px){main{padding:12px}
.grid{display:block}.card{margin-bottom:12px}.row,.row3,.row4,.summary{grid-template-columns:1fr}.hero{align-items:flex-start}.pill{display:none}
td,th{font-size:12px}.wide-table{overflow:auto}.wide-table table{min-width:1120px}.filterbar>div{min-width:100%}nav{flex-wrap:wrap;
overflow:visible}.tab{font-size:13px;padding:9px 11px}.pager{justify-content:center}}
</style>
</head>
<body>
<header>
 <div class="wrap hero"><div><h1>🍱 個人飲食紀錄系統</h1><div class="sub">逐筆記錄食物，連動每日、每週、每月飲食清單。資料只存在本機 localStorage。</div></div><div
class="pill">本機保存中</div></div>
 <nav id="tabs">
   <button class="tab active" type="button" data-tab="entry">新增食物</button>
   <button class="tab" type="button" data-tab="foods">每項食物紀錄</button>
   <button class="tab" type="button" data-tab="fullList">完整食物清單</button>
   <button class="tab" type="button" data-tab="daily">每日飲食</button>
   <button class="tab" type="button" data-tab="weekly">每週列表</button>
   <button class="tab" type="button" data-tab="monthly">每月列表</button>
   <button class="tab" type="button" data-tab="settings">設定/備份</button>
 </nav>
</header>
<main>
<section id="entry" class="panel active">
 <div class="grid">
   <div class="card col-7">
     <h2 id="entryTitle">新增每一項吃的食物</h2>
     <form id="foodForm">
       <input type="hidden" id="editId">
       <input type="hidden" id="photoData">
       <div class="row3">
         <div><label>日期</label><input type="date" id="date" required></div>
         <div><label>餐別</label><select id="meal"><option>早餐</option><option>早午餐</option><option>午餐</option><option>午晚餐</option>
<option>晚餐</option><option>點心</option><option>宵夜</option><option>飲料</option><option>其他</option></select></div>
         <div><label>什麼食物</label><input id="foodName" required placeholder="例：麻辣火鍋、雞胸便當"></div>
       </div>
       <div style="margin-top:10px"><label>食物描述</label><textarea id="description" placeholder="例：肉片 5 片、青菜 1 拳、蘿蔔 3 塊、白飯半碗"></textarea></div>
       <div class="row" style="margin-top:10px">
         <div><label>什麼情況下吃的</label><input id="situation" placeholder="例：加班後、朋友聚餐、運動後"></div>
         <div><label>上傳照片（食物描述補充）</label><input type="file" id="photo" accept="image/*"></div>
       </div>
       <h3>營養估算</h3>
       <div class="row3">
         <div><label>熱量 kcal</label><input type="number" id="calories" min="0" step="1" placeholder="0"></div>
         <div><label>碳水 g</label><input type="number" id="carbs" min="0" step="0.1" placeholder="0"></div>
         <div><label>蛋白質 g</label><input type="number" id="protein" min="0" step="0.1" placeholder="0"></div>
         <div><label>脂肪 g</label><input type="number" id="fat" min="0" step="0.1" placeholder="0"></div>
         <div><label>鈉 mg</label><input type="number" id="sodium" min="0" step="1" placeholder="0"></div>
       </div>
       <h3>蔬菜與纖維估算</h3>
       <div class="row4">
         <div><label>快捷選項</label><select id="vegQuick"><option value="">不使用</option><option value="boiledGreens">一盤外食燙青菜</option></select></div>
         <div><label>蔬菜重量 g</label><input type="number" id="vegWeight" min="0" step="1" placeholder="例：100"></div>
         <div><label>蔬菜拳頭數</label><input type="number" id="vegFists" min="0" step="0.1" placeholder="例：1"></div>
         <div><label>估算蔬菜纖維 g</label><input type="number" id="vegFiber" min="0" step="0.1" readonly></div>
       </div>
       <div class="hint" id="vegCalcHint" style="margin-top:8px">蔬菜份數：0 份</div>
       <div class="actions"><button class="btn" type="submit">儲存食物紀錄</button><button class="btn secondary" type="button"
id="resetForm">清空欄位</button></div>
     </form>
   </div>
   <div class="card col-5"><h2>今日快速總覽</h2><div id="todaySummary" class="summary"></div></div>
 </div>
</section>
<section id="foods" class="panel">
 <div class="card"><h2>每項食物紀錄表</h2><div class="filterbar"><div><label>開始日期</label><input type="date" id="foodStart"></div><div>
<label>結束日期</label><input type="date" id="foodEnd"></div><div><label>餐別</label><select id="foodMeal"><option value="">全部</option>
<option>早餐</option><option>早午餐</option><option>午餐</option><option>午晚餐</option><option>晚餐</option><option>點心</option><option>宵夜</option>
<option>飲料</option><option>其他</option></select></div><div><label>搜尋食物/描述</label><input id="foodSearch" placeholder="關鍵字"></div><button
class="btn secondary" type="button" data-render="foods">篩選</button></div><div class="wide-table" id="foodTable"></div><div id="foodPager"
class="pager"></div></div>
</section>
<section id="fullList" class="panel">
 <div class="card"><h2>完整食物記錄表清單</h2><div class="filterbar"><div><label>搜尋食物/描述/情境</label><input id="fullSearch" placeholder="例：火鍋、青菜、聚餐">
</div><div><label>特定日期</label><input type="date" id="fullExactDate"></div><div><label>特定月份</label><input type="month" id="fullMonth"></div><div>
<label>開始日期</label><input type="date" id="fullStart"></div><div><label>結束日期</label><input type="date" id="fullEnd"></div><div><label>餐別</label>
<select id="fullMeal"><option value="">全部</option><option>早餐</option><option>早午餐</option><option>午餐</option><option>午晚餐</option>
<option>晚餐</option><option>點心</option><option>宵夜</option><option>飲料</option><option>其他</option></select></div><button class="btn secondary"
type="button" data-render="full">搜尋/篩選</button><button class="btn secondary" type="button" id="clearFullBtn">清除條件</button></div><div
class="wide-table" id="fullTable"></div><div id="fullPager" class="pager"></div></div>
</section>
<section id="daily" class="panel">
 <div class="grid"><div class="card col-4"><h2>每日補充資料</h2><div><label>選擇日期</label><input type="date" id="dailyDate"></div><div class="row"
style="margin-top:10px"><div><label>當天是否有運動</label><select id="exercise"><option value="no">沒有</option><option value="yes">有</option></select>
</div><div><label>消耗多少大卡</label><input type="number" id="exerciseKcal" min="0" step="1"></div></div><div class="row" style="margin-top:10px">
<div><label>有沒有排便</label><select id="bowel"><option value="unknown">未記錄</option><option value="yes">有</option><option value="no">沒有</option>
</select></div><div><label>備註</label><input id="dailyNote" placeholder="例：很餓、外食偏鹹"></div></div><div class="actions"><button class="btn"
type="button" id="saveDailyMeta">儲存每日補充</button></div></div><div class="card col-8"><h2>每日飲食紀錄</h2><div id="dailyDetail"></div></div></div>
</section>
<section id="weekly" class="panel"><div class="card"><h2>每週吃的食物列表</h2><div class="filterbar"><div><label>選擇週內任一天</label><input type="date"
id="weekDate"></div><button class="btn secondary" type="button" data-render="weekly">更新週列表</button></div><div id="weeklyList" class="list">
</div><div id="weeklyPager" class="pager"></div></div></section>
<section id="monthly" class="panel"><div class="card"><h2>每月吃的食物列表</h2><div class="filterbar"><div><label>選擇月份</label><input type="month"
id="monthDate"></div><button class="btn secondary" type="button" data-render="monthly">更新月列表</button></div><div id="monthlyList" class="list">
</div><div id="monthlyPager" class="pager"></div></div></section>
<section id="settings" class="panel">
 <div class="grid"><div class="card col-6"><h2>目標設定</h2><div class="row3"><div><label>熱量綠燈上限 kcal</label><input type="number" id="setCalGreen"
min="1" step="1"></div><div><label>熱量黃燈上限 kcal</label><input type="number" id="setCalYellow" min="1" step="1"></div><div><label>蛋白質黃燈下限
g</label><input type="number" id="setProteinYellow" min="1" step="1"></div><div><label>蛋白質綠燈下限 g</label><input type="number"
id="setProteinGreen" min="1" step="1"></div><div><label>單項食物蔬菜纖維足夠 g</label><input type="number" id="setFoodFiber" min="0" step="0.5"></div>
</div><div class="actions"><button class="btn" id="saveSettings" type="button">儲存設定</button><button class="btn secondary" id="restoreDefaults"
type="button">恢復預設</button></div></div><div class="card col-6"><h2>備份 / 還原</h2><p class="hint">localStorage 只會保存在目前瀏覽器與裝置。不同瀏覽器或不同裝置不會自動同步。</p>
<div class="actions"><button class="btn" id="exportJson" type="button">匯出 JSON</button><label class="btn secondary"
style="display:inline-block">匯入 JSON<input type="file" id="importJson" accept="application/json" style="display:none"></label><button class="btn
danger" id="clearAll" type="button">清空全部資料</button></div><h3>目前資料摘要</h3><div id="dataStats" class="hint"></div></div></div>
</section>
</main><div id="toast" class="toast"></div>
<script>
(function(){
'use strict';
var LS_KEY='diet_tracker_clean_v1';
var OLD_KEYS=['personal_diet_tracker_v5','personal_diet_tracker_v3','personalDietTrackerV4','personal_diet_tracker_v2','personal_diet_tracker_v1'
];
var PAGE_SIZE=50;
var DEFAULT_SETTINGS={calGreen:1100,calYellow:1500,proteinYellow:50,proteinGreen:60,proteinIdeal:72,foodFiberEnough:2.5};
var state={foods:[],dailyMeta:{},settings:copy(DEFAULT_SETTINGS)};
var pages={foods:1,full:1,weekly:1,monthly:1};
function $(id){return document.getElementById(id)}
function copy(o){return JSON.parse(JSON.stringify(o))}
function today(){return new Date().toISOString().slice(0,10)}
function monthNow(){return today().slice(0,7)}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n}
function r1(v){return Math.round(num(v)*10)/10}
function uid(){return 'f'+Date.now()+Math.random().toString(36).slice(2,8)}
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]})}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}
function normalizeFood(f){f=f||{};var w=num(f.vegWeight);var fist=num(f.vegFists);if(!w&&fist)w=fist*100;if(w&&!fist)fist=w/100;var
vf=num(f.vegFiber);if(!vf&&w)vf=w/100*2.5;return{
id:f.id||uid(),date:f.date||today(),meal:f.meal||'其他',foodName:f.foodName||f.food||f.name||'',description:f.description||f.desc||'',situation:f.s
ituation||f.context||'',calories:num(f.calories||f.cal),carbs:num(f.carbs||f.carb),protein:num(f.protein),fat:num(f.fat),sodium:num(f.sodium),veg
Weight:w,vegFists:fist,vegFiber:vf,photo:f.photo||'',createdAt:f.createdAt||new Date().toISOString()}}
function load(){var raw=localStorage.getItem(LS_KEY);if(!raw){for(var i=0;i<OLD_KEYS.length;i++){raw=localStorage.getItem(OLD_KEYS[i]);
if(raw)break}}if(raw){try{var d=JSON.parse(raw);state={foods:(d.foods||[]).map(normalizeFood),dailyMeta:d.dailyMeta||{}
,settings:Object.assign(copy(DEFAULT_SETTINGS),d.settings||{})}}catch(e){console.warn(e)}}}
function save(noToast){localStorage.setItem(LS_KEY,JSON.stringify(state));renderAll();if(!noToast)toast('已儲存')}
function bindTabs(){document.querySelectorAll('.tab').forEach(function(btn){btn.addEventListener('click',function(){
showTab(btn.getAttribute('data-tab'))})})}
function showTab(id){document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-tab')===id)});
document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('active',p.id===id)});if(id==='foods')renderFoods(1);
if(id==='fullList')renderFullList(1);if(id==='daily')renderDaily();if(id==='weekly')renderWeekly(1);if(id==='monthly')renderMonthly(1);
if(id==='settings')renderStats()}
function bindForm(){$('vegQuick').addEventListener('change',function(){if($('vegQuick').value==='boiledGreens'){$('vegWeight').value=100;
calcVegFromWeight()}});$('vegWeight').addEventListener('input',calcVegFromWeight);$('vegFists').addEventListener('input',calcVegFromFists);
$('photo').addEventListener('change',readPhoto);$('resetForm').addEventListener('click',resetForm);
$('foodForm').addEventListener('submit',saveFood)}
function calcVegFromWeight(){var w=num($('vegWeight').value);$('vegFists').value=w?r1(w/100):'';$('vegFiber').value=w?r1(w/100*2.5):'';
$('vegCalcHint').textContent='蔬菜份數：'+(w?r1(w/100):0)+' 份'}
function calcVegFromFists(){var f=num($('vegFists').value);$('vegWeight').value=f?r1(f*100):'';$('vegFiber').value=f?r1(f*2.5):'';
$('vegCalcHint').textContent='蔬菜份數：'+(f?r1(f):0)+' 份'}
function readPhoto(e){var file=e.target.files[0];if(!file){$('photoData').value='';return}var reader=new FileReader();reader.onload=function(){
$('photoData').value=reader.result};reader.readAsDataURL(file)}
function resetForm(){$('foodForm').reset();$('editId').value='';$('photoData').value='';$('date').value=today();$('vegFiber').value='';
$('vegCalcHint').textContent='蔬菜份數：0 份';$('entryTitle').textContent='新增每一項吃的食物'}
function saveFood(e){e.preventDefault();var id=$('editId').value||uid();var old=state.foods.find(function(x){return x.id===id});var
f=normalizeFood({id:id,date:$('date').value,meal:$('meal').value,foodName:$('foodName').value.trim(),description:$('description').value.trim(),si
tuation:$('situation').value.trim(),calories:$('calories').value,carbs:$('carbs').value,protein:$('protein').value,fat:$('fat').value,sodium:$('s
odium').value,vegWeight:$('vegWeight').value,vegFists:$('vegFists').value,vegFiber:$('vegFiber').value,photo:$('photoData').value||(old?old.photo
:''),createdAt:old?old.createdAt:new Date().toISOString()});if(!f.foodName){alert('請輸入食物名稱');return}var idx=state.foods.findIndex(function(x){
return x.id===id});if(idx>=0)state.foods[idx]=f;else state.foods.push(f);resetForm();save()}
function fillForm(f){$('date').value=f.date;$('meal').value=f.meal;$('foodName').value=f.foodName;$('description').value=f.description;
$('situation').value=f.situation;$('calories').value=f.calories||'';$('carbs').value=f.carbs||'';$('protein').value=f.protein||'';
$('fat').value=f.fat||'';$('sodium').value=f.sodium||'';$('vegWeight').value=f.vegWeight||'';$('vegFists').value=f.vegFists||'';
$('vegFiber').value=f.vegFiber||'';$('photoData').value=f.photo||'';$('vegCalcHint').textContent='蔬菜份數：'+r1(num(f.vegWeight)/100)+' 份'}
function editFood(id){var f=state.foods.find(function(x){return x.id===id});if(!f)return;showTab('entry');$('editId').value=f.id;fillForm(f);
$('entryTitle').textContent='編輯食物紀錄';toast('已載入編輯')}
function duplicateFood(id){var f=state.foods.find(function(x){return x.id===id});if(!f)return;var c=copy(f);c.id=uid();c.createdAt=new
Date().toISOString();state.foods.push(c);save();toast('已複製一筆')}
function deleteFood(id){if(confirm('確定刪除這筆食物紀錄？')){state.foods=state.foods.filter(function(x){return x.id!==id});save()}}
window.editFood=editFood;window.duplicateFood=duplicateFood;window.deleteFood=deleteFood;
function bindFilters(){['foodStart','foodEnd','foodMeal','foodSearch'].forEach(function(id){$(id).addEventListener('input',function(){
renderFoods(1)})});['fullSearch','fullExactDate','fullMonth','fullStart','fullEnd','fullMeal'].forEach(function(id){
$(id).addEventListener('input',function(){renderFullList(1)})});$('clearFullBtn').addEventListener('click',function(){
['fullSearch','fullExactDate','fullMonth','fullStart','fullEnd','fullMeal'].forEach(function(id){$(id).value=''});renderFullList(1)});
document.querySelectorAll('[data-render]').forEach(function(b){b.addEventListener('click',function(){var r=b.getAttribute('data-render');
if(r==='foods')renderFoods(1);if(r==='full')renderFullList(1);if(r==='weekly')renderWeekly(1);if(r==='monthly')renderMonthly(1)})});
$('weekDate').addEventListener('change',function(){renderWeekly(1)});$('monthDate').addEventListener('change',function(){renderMonthly(1)})}
function totals(date){var items=state.foods.filter(function(f){return f.date===date});var t={
items:items,calories:0,carbs:0,protein:0,fat:0,sodium:0,vegWeight:0,vegFists:0,vegFiber:0};items.forEach(function(f){
['calories','carbs','protein','fat','sodium','vegWeight','vegFists','vegFiber'].forEach(function(k){t[k]+=num(f[k])})});return t}
function calStatus(v){return num(v)<=state.settings.calGreen?'💚':num(v)<=state.settings.calYellow?'💛':'❤'}
function proteinStatus(v){v=num(v);return
v>state.settings.proteinGreen&&v<=state.settings.proteinIdeal?'🟢':v>state.settings.proteinYellow&&v<=state.settings.proteinGreen?'🟡':'🔴'}
function vegWeightStatus(v){v=num(v);return v<300?'不足':v<500?'基本':'理想'}
function vegFiberStatus(v){v=num(v);return v<7.5?'不足':v<12.5?'基本':'理想'}
function clsStatus(s){return s==='理想'?'good':s==='基本'?'warn':'bad'}
function summaryCards(t){return '<div class="metric"><div class="cap">熱量</div><div class="num">'+r1(t.calories)+'</div><div class="cap">kcal
'+calStatus(t.calories)+'</div></div><div class="metric"><div class="cap">蛋白質</div><div class="num">'+r1(t.protein)+'g</div><div
class="cap">'+proteinStatus(t.protein)+'</div></div><div class="metric"><div class="cap">蔬菜纖維</div><div class="num">'+r1(t.vegFiber)+'g</div>
<div class="cap">'+vegFiberStatus(t.vegFiber)+'</div></div><div class="metric"><div class="cap">鈉</div><div class="num">'+r1(t.sodium)+'</div>
<div class="cap">mg</div></div><div class="metric"><div class="cap">今日蔬菜</div><div class="num">'+r1(t.vegWeight)+'g</div><div
class="cap">'+vegWeightStatus(t.vegWeight)+'</div></div><div class="metric"><div class="cap">今日蔬菜</div><div
class="num">'+r1(t.vegFists)+'拳</div><div class="cap">100g = 1拳</div></div><div class="metric"><div class="cap">碳水 / 脂肪</div><div
class="num">'+r1(t.carbs)+' / '+r1(t.fat)+'g</div><div class="cap">每日加總</div></div><div class="metric"><div class="cap">餐別數</div><div
class="num">'+(new Set(t.items.map(function(i){return i.meal}))).size+'</div><div class="cap">共 '+t.items.length+' 筆</div></div>'}
function renderToday(){$('todaySummary').innerHTML=summaryCards(totals(today()))}
function rowActions(id){return '<button class="btn small secondary" type="button" onclick="editFood(\''+id+'\')">編輯</button> <button class="btn
small secondary" type="button" onclick="duplicateFood(\''+id+'\')">複製</button> <button class="btn small danger" type="button"
onclick="deleteFood(\''+id+'\')">刪除</button>'}
function tableRows(items){if(!items.length)return '<div class="empty">目前沒有資料</div>';var html='<table><thead><tr><th>日期</th><th>餐別</th>
<th>食物</th><th>描述/情況</th><th>熱量</th><th>碳/蛋/脂</th><th>鈉</th><th>蔬菜/纖維</th><th>照片</th><th>操作</th></tr></thead><tbody>';items.forEach(function(f){
html+='<tr><td>'+esc(f.date)+'</td><td>'+esc(f.meal)+'</td><td><b>'+esc(f.foodName)+'</b><br><span
class="hint">'+(num(f.vegFiber)>=state.settings.foodFiberEnough?'蔬菜纖維足夠':'蔬菜纖維偏少')+'</span></td><td>'+esc(f.description)+'<br><span
class="hint">'+esc(f.situation)+'</span></td><td>'+r1(f.calories)+'</td><td>'+r1(f.carbs)+' / '+r1(f.protein)+' / '+r1(f.fat)+'g</td>
<td>'+r1(f.sodium)+'mg</td><td>'+r1(f.vegWeight)+'g<br>'+r1(f.vegFists)+'拳<br>'+r1(f.vegFiber)+'g纖維</td><td>'+(f.photo?'<img class="foodpic"
src="'+f.photo+'">':'')+'</td><td>'+rowActions(f.id)+'</td></tr>'});return html+'</tbody></table>'}
function paginate(items,page){var max=Math.max(1,Math.ceil(items.length/PAGE_SIZE));page=Math.min(Math.max(1,page||1),max);return{
page:page,max:max,total:items.length,items:items.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE)}}
function pager(kind,p){return '<button class="btn small secondary" type="button" data-pagekind="'+kind+'" data-page="'+(p.page-1)+'"
'+(p.page<=1?'disabled':'')+'>上一頁</button><span class="hint">第 '+p.page+' / '+p.max+' 頁，共 '+p.total+' 筆；每頁最多 '+PAGE_SIZE+' 筆</span><button
class="btn small secondary" type="button" data-pagekind="'+kind+'" data-page="'+(p.page+1)+'" '+(p.page>=p.max?'disabled':'')+'>下一頁</button>'}
document.addEventListener('click',function(e){var b=e.target.closest('[data-pagekind]');if(!b)return;var
kind=b.getAttribute('data-pagekind'),page=parseInt(b.getAttribute('data-page'),10);if(kind==='foods')renderFoods(page);
if(kind==='full')renderFullList(page);if(kind==='weekly')renderWeekly(page);if(kind==='monthly')renderMonthly(page)});
function filteredBasic(){var arr=state.foods.slice().sort(function(a,b){return
b.date.localeCompare(a.date)||b.createdAt.localeCompare(a.createdAt)});var
q=$('foodSearch').value.trim().toLowerCase(),st=$('foodStart').value,en=$('foodEnd').value,meal=$('foodMeal').value;
if(q)arr=arr.filter(function(f){return (f.foodName+' '+f.description+' '+f.situation).toLowerCase().indexOf(q)>=0});
if(st)arr=arr.filter(function(f){return f.date>=st});if(en)arr=arr.filter(function(f){return f.date<=en});if(meal)arr=arr.filter(function(f){
return f.meal===meal});return arr}
function renderFoods(page){pages.foods=page||1;var p=paginate(filteredBasic(),pages.foods);$('foodTable').innerHTML=tableRows(p.items);
$('foodPager').innerHTML=pager('foods',p)}
function renderFullList(page){pages.full=page||1;var arr=state.foods.slice().sort(function(a,b){return
b.date.localeCompare(a.date)||b.createdAt.localeCompare(a.createdAt)});var
q=$('fullSearch').value.trim().toLowerCase(),exact=$('fullExactDate').value,mon=$('fullMonth').value,st=$('fullStart').value,en=$('fullEnd').valu
e,meal=$('fullMeal').value;if(q)arr=arr.filter(function(f){return (f.foodName+' '+f.description+' '+f.situation).toLowerCase().indexOf(q)>=0});
if(exact)arr=arr.filter(function(f){return f.date===exact});if(mon)arr=arr.filter(function(f){return f.date.indexOf(mon)===0});
if(st)arr=arr.filter(function(f){return f.date>=st});if(en)arr=arr.filter(function(f){return f.date<=en});if(meal)arr=arr.filter(function(f){
return f.meal===meal});var p=paginate(arr,pages.full);$('fullTable').innerHTML=tableRows(p.items);$('fullPager').innerHTML=pager('full',p)}
function bindDaily(){$('dailyDate').addEventListener('change',function(){loadDailyMeta();renderDaily()});
$('saveDailyMeta').addEventListener('click',function(){var d=$('dailyDate').value;state.dailyMeta[d]={
exercise:$('exercise').value,exerciseKcal:num($('exerciseKcal').value),bowel:$('bowel').value,note:$('dailyNote').value};save()})}
function loadDailyMeta(){var m=state.dailyMeta[$('dailyDate').value]||{};$('exercise').value=m.exercise||'no';
$('exerciseKcal').value=m.exerciseKcal||'';$('bowel').value=m.bowel||'unknown';$('dailyNote').value=m.note||''}
function renderDaily(){loadDailyMeta();var d=$('dailyDate').value,t=totals(d),m=state.dailyMeta[d]||{};var meals=[].slice.call(new
Set(t.items.map(function(i){return i.meal}))).join('、')||'尚無';var foods=t.items.map(function(i){return i.foodName}).join('、')||'尚無';var
vw=vegWeightStatus(t.vegWeight),vf=vegFiberStatus(t.vegFiber);var assess='熱量 '+calStatus(t.calories)+'；蛋白質
'+proteinStatus(t.protein)+'；蔬菜攝取狀態：'+vw+'；蔬菜纖維：'+vf+'；'+(m.bowel==='no'?'今日未排便，可留意水分與蔬菜。':m.bowel==='yes'?'今日有排便。':'排便未記錄。');
$('dailyDetail').innerHTML='<div class="summary">'+summaryCards(t)+'</div><div class="note" style="margin-top:12px">今日蔬菜：約 '+r1(t.vegWeight)+'
g<br>今日蔬菜：約 '+r1(t.vegFists)+' 拳<br>蔬菜提供纖維：約 '+r1(t.vegFiber)+' g<br>蔬菜攝取狀態：<b class="'+clsStatus(vw)+'">'+vw+'</b>；蔬菜纖維狀態：<b
class="'+clsStatus(vf)+'">'+vf+'</b></div><h3>當天完整欄位</h3><div class="chips"><span class="chip">餐別：'+esc(meals)+'</span><span
class="chip">總共吃了：'+esc(foods)+'</span><span class="chip">運動：'+(m.exercise==='yes'?'有，消耗 '+num(m.exerciseKcal)+' kcal':'沒有')+'</span><span
class="chip">排便：'+(m.bowel==='yes'?'有':m.bowel==='no'?'沒有':'未記錄')+'</span></div><h3>自動當天營養總結評估</h3><div
class="note">'+assess+(m.note?'<br>備註：'+esc(m.note):'')+'</div><h3>當天食物明細</h3><div class="wide-table">'+tableRows(t.items)+'</div>'}
function startOfWeek(dateStr){var d=new Date(dateStr+'T00:00:00');var day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d}
function fmt(d){return d.toISOString().slice(0,10)}
function dayCard(d){var t=totals(d),m=state.dailyMeta[d]||{};return '<div class="dayitem"><div class="daytop"><b>'+d+'</b><span
class="hint">'+t.items.length+' 筆</span></div><div class="chips"><span class="chip">熱量 '+r1(t.calories)+' '+calStatus(t.calories)+'</span><span
class="chip">蛋白質 '+r1(t.protein)+'g '+proteinStatus(t.protein)+'</span><span class="chip">蔬菜 '+r1(t.vegWeight)+'g / '+r1(t.vegFists)+'拳</span>
<span class="chip">蔬菜纖維 '+r1(t.vegFiber)+'g</span><span class="chip">排便 '+(m.bowel==='yes'?'有':m.bowel==='no'?'沒有':'未記錄')+'</span></div><div
class="hint" style="margin-top:8px">食物：'+esc(t.items.map(function(i){return i.foodName}).join('、')||'尚無')+'</div></div>'}
function renderWeekly(page){var s=startOfWeek($('weekDate').value||today()),days=[];for(var i=0;i<7;i++){var d=new Date(s);
d.setDate(s.getDate()+i);days.push(fmt(d))}var p=paginate(days,page||1);$('weeklyList').innerHTML=p.items.map(dayCard).join('');
$('weeklyPager').innerHTML=pager('weekly',p)}
function renderMonthly(page){var mon=$('monthDate').value||monthNow();var parts=mon.split('-'),y=parseInt(parts[0],10),m=parseInt(parts[1],10);
var last=new Date(y,m,0).getDate(),days=[];for(var d=1;d<=last;d++)days.push(mon+'-'+String(d).padStart(2,'0'));var p=paginate(days,page||1);
$('monthlyList').innerHTML=p.items.map(dayCard).join('');$('monthlyPager').innerHTML=pager('monthly',p)}
function fillSettings(){var s=state.settings;$('setCalGreen').value=s.calGreen;$('setCalYellow').value=s.calYellow;
$('setProteinYellow').value=s.proteinYellow;$('setProteinGreen').value=s.proteinGreen;$('setFoodFiber').value=s.foodFiberEnough}
function bindSettings(){$('saveSettings').addEventListener('click',function(){state.settings=Object.assign(state.settings,{
calGreen:num($('setCalGreen').value),calYellow:num($('setCalYellow').value),proteinYellow:num($('setProteinYellow').value),proteinGreen:num($('se
tProteinGreen').value),foodFiberEnough:num($('setFoodFiber').value)});save()});$('restoreDefaults').addEventListener('click',function(){
state.settings=copy(DEFAULT_SETTINGS);fillSettings();save()});$('exportJson').addEventListener('click',function(){var blob=new
Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='diet-tracker-backup-'+today()+'.json';a.click();URL.revokeObjectURL(a.href)});$('importJson').addEventListener('change',function(e){
var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(){try{var d=JSON.parse(reader.result);state={
foods:(d.foods||[]).map(normalizeFood),dailyMeta:d.dailyMeta||{},settings:Object.assign(copy(DEFAULT_SETTINGS),d.settings||{})};fillSettings();
save()}catch(err){alert('JSON 格式不正確')}};reader.readAsText(file)});$('clearAll').addEventListener('click',function(){
if(confirm('確定清空全部資料？此動作無法復原，建議先匯出備份。')){state={foods:[],dailyMeta:{},settings:copy(DEFAULT_SETTINGS)};fillSettings();save()}})}
function renderStats(){var dates=[].slice.call(new Set(state.foods.map(function(f){return f.date})));
$('dataStats').innerHTML='食物紀錄：'+state.foods.length+' 筆<br>有紀錄的日期：'+dates.length+' 天<br>每日補充資料：'+Object.keys(state.dailyMeta).length+' 天'}
function renderAll(){renderToday();renderFoods(pages.foods);renderFullList(pages.full);renderDaily();renderWeekly(pages.weekly);
renderMonthly(pages.monthly);renderStats()}
function init(){load();$('date').value=today();$('dailyDate').value=today();$('weekDate').value=today();$('monthDate').value=monthNow();
fillSettings();bindTabs();bindForm();bindFilters();bindDaily();bindSettings();save(true);showTab('entry')}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
