<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人飲食紀錄系統</title>
<style>
:root{--bg:#f6f4ef;--card:#fffaf3;--ink:#2d2a26;--muted:#756f66;--line:#e8dfd2;--accent:#a86f3d;--accentSoft:#f6eee3;--green:#2f8f62;--yellow:#b68413
;--red:#c64b3c;--shadow:0 8px 24px rgba(65,45,25,.09);--radius:18px}
*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden;background:var(--bg);color:var(--ink)
;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Roboto,Arial,sans-serif}header{padding:20px 16px 12px
;background:linear-gradient(180deg,#fffaf3,#f6f4ef);border-bottom:1px solid var(--line)}h1{font-size:28px;line-height:1.2;margin:0;font-weight:950
}.sub{font-size:14px;line-height:1.6;color:var(--muted);margin-top:8px}.wrap{width:100%;max-width:1180px;margin:auto;padding:14px}.tabs{display:flex
;gap:9px;overflow-x:auto;position:sticky;top:0;background:var(--bg);z-index:5;padding:8px 0 12px;-webkit-overflow-scrolling:touch}.tab{flex:0 0 auto
;border:1px solid var(--line);background:#fff;color:#3d342d;border-radius:999px;padding:11px 15px;min-width:104px;font-weight:900;font-size:14px
;white-space:nowrap;box-shadow:0 1px 3px rgba(65,45,25,.05);cursor:pointer}.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)
}.panel{display:none}.panel.active{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px
;margin-bottom:13px;box-shadow:var(--shadow);max-width:100%;overflow:hidden}h2{font-size:21px;margin:0 0 12px}h3{font-size:16px;margin:14px 0 8px
;color:#5c4630}.hint{font-size:13px;color:var(--muted);line-height:1.55;margin:4px 0 12px}.note{background:#fff7e9;border:1px solid #ead5b8
;border-radius:14px;padding:11px;color:#5a4125;font-size:13px;line-height:1.6}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))
;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.grid4,.summary{display:grid
;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}label{display:block;margin-bottom:6px;font-size:14px;font-weight:900
;color:#5d554d}input,select,textarea{width:100%;min-height:44px;padding:11px 12px;border:1px solid #ded2c4;border-radius:13px;background:#fff
;font-size:16px;color:var(--ink)}textarea{min-height:82px;resize:vertical}.row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.btn{border:0
;border-radius:13px;padding:11px 13px;font-weight:900;font-size:14px;cursor:pointer;background:var(--accent);color:#fff
}.btn.secondary{background:#fff;color:var(--accent);border:1px solid var(--line)}.btn.danger{background:#fee2e2;color:#991b1b
}.btn.green{background:#dcfce7;color:#166534}.btn.blue{background:#dbeafe;color:#1d4ed8}.btn.small{font-size:12px;padding:7px 9px;border-radius:10px
}.stat,.metric{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px}.metric .k,.stat .k{font-size:13px;font-weight:900
;color:var(--muted)}.metric .v,.stat .v{font-size:22px;font-weight:950;margin-top:5px}.greenText{color:var(--green)}.redText{color:var(--red)
}.amberText{color:var(--yellow)}.tableWrap{width:100%;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line)
;border-radius:15px;background:#fff}.scrollHint{font-size:12px;color:var(--muted);margin:6px 0;display:none}table{border-collapse:collapse;width:100%
;min-width:1080px}th,td{border-bottom:1px solid var(--line);padding:9px 8px;text-align:left;vertical-align:top;font-size:13px}th{background:#fbf7ef
;font-weight:950;color:#574b42;position:sticky;top:0;z-index:1}tr:last-child td{border-bottom:0}.pill{display:inline-block;border-radius:999px
;padding:3px 8px;font-size:12px;font-weight:900;background:var(--accentSoft);color:#5c4630}.pill.ok{background:#dcfce7;color:#166534
}.pill.warn{background:#fef3c7;color:#92400e}.pill.over{background:#fee2e2;color:#991b1b}.pager{display:flex;gap:10px;align-items:center
;justify-content:space-between;flex-wrap:wrap;margin:9px 0}.pagerInfo{font-size:13px;color:var(--muted);font-weight:900}.foodpic{width:54px
;height:54px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}.dayitem{background:#fff;border:1px solid var(--line)
;border-radius:16px;padding:13px;margin-bottom:10px}.daytop{display:flex;justify-content:space-between;gap:10px;align-items:center
}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:12px;background:var(--accentSoft);border:1px solid var(--line)
;border-radius:999px;padding:4px 8px}.empty{padding:24px;text-align:center;background:#fff;border:1px dashed var(--line);border-radius:16px
;color:var(--muted)}.hide{display:none!important}.settingGrid{display:grid;gap:10px}.optionItem{display:flex;gap:8px;align-items:center
;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px}.optionItem span{flex:1}.photoPreview{margin-top:8px}.photoPreview
img{max-width:120px;border-radius:12px;border:1px solid var(--line)}
@media (min-width:761px) and (max-width:1050px){.grid4,.summary{grid-template-columns:repeat(2,minmax(0,1fr))
}.grid3{grid-template-columns:repeat(2,minmax(0,1fr))}.wrap{max-width:100%;padding:13px}}
@media (max-width:760px){header{padding:18px 13px 9px}h1{font-size:24px}.sub{font-size:13px}.wrap{padding:10px}.tabs{gap:8px;padding-bottom:10px
}.tab{min-width:100px;padding:10px 12px;font-size:13px}.card{padding:14px;border-radius:16px}.grid,.grid3,.grid4,.summary{grid-template-columns:1fr
}.row .btn{flex:1 1 auto}.scrollHint{display:block}table{min-width:920px}th,td{font-size:12px;padding:8px 7px}.metric .v,.stat .v{font-size:20px}}
</style>
</head>
<body>
<header><h1>🍱 個人飲食紀錄系統</h1><div class="sub">逐筆記錄食物，連動每日、每週、每月飲食清單。資料儲存在本機瀏覽器 localStorage。</div></header>
<div class="wrap">
<div class="tabs">
<button class="tab active" data-tab="entry" onclick="showTab('entry')">新增食物</button>
<button class="tab" data-tab="foods" onclick="showTab('foods')">每項食物紀錄</button>
<button class="tab" data-tab="fullList" onclick="showTab('fullList')">完整食物清單</button>
<button class="tab" data-tab="daily" onclick="showTab('daily')">每日飲食</button>
<button class="tab" data-tab="weekly" onclick="showTab('weekly')">每週列表</button>
<button class="tab" data-tab="monthly" onclick="showTab('monthly')">每月列表</button>
<button class="tab" data-tab="settings" onclick="showTab('settings')">設定/備份</button>
</div>
 
<section id="entry" class="panel active"><div class="card"><h2 id="entryTitle">新增每一項吃的食物</h2><form id="foodForm"><input type="hidden" id="editId"
><input type="hidden" id="photoData"><div class="grid3"><div><label>日期</label><input type="date" id="date"></div><div><label>餐別</label><select
id="meal"><option>早餐</option><option>早午餐</option><option>午餐</option><option>午晚餐</option><option>晚餐</option><option>點心</option><option>宵夜</option
><option>飲料</option><option>其他</option></select></div><div><label>什麼食物</label><input id="foodName" placeholder="例：麻辣火鍋、雞胸便當"></div><div class="full"
><label>食物描述</label><textarea id="description" placeholder="例：肉片 5 片、青菜 1 拳、蘿蔔 3 塊、白飯半碗"></textarea></div><div><label>什麼情況下吃的</label><input
id="situation" placeholder="例：加班後、朋友聚餐、運動後"></div><div><label>照片</label><input type="file" id="photo" accept="image/*"><div id="photoPreview"
class="photoPreview"></div></div></div><h3>營養估算</h3><div class="grid3"><div><label>熱量 kcal</label><input type="number" id="calories" min="0"
step="1"></div><div><label>碳水 g</label><input type="number" id="carbs" min="0" step="0.1"></div><div><label>蛋白質 g</label><input type="number"
id="protein" min="0" step="0.1"></div><div><label>脂肪 g</label><input type="number" id="fat" min="0" step="0.1"></div><div><label>鈉 mg</label><input
type="number" id="sodium" min="0" step="1"></div></div><h3>蔬菜與纖維估算</h3><div class="note">100g 蔬菜 = 1 份 = 1 拳 = 2.5g 纖維。可輸入蔬菜重量或拳頭數，系統會自動換算。</div
><div class="grid4" style="margin-top:10px"><div><label>快捷選項</label><select id="vegQuick"><option value="">不使用</option><option
value="boiledGreens">一盤外食燙青菜</option></select></div><div><label>蔬菜重量 g</label><input type="number" id="vegWeight" min="0" step="1"
placeholder="例：100"></div><div><label>蔬菜拳頭數</label><input type="number" id="vegFists" min="0" step="0.1" placeholder="例：1"></div><div><label>估算蔬菜纖維
g</label><input type="number" id="vegFiber" readonly></div></div><div class="hint" id="vegCalcHint">蔬菜份數：0 份</div><div class="row"
style="margin-top:14px"><button class="btn green" type="button" onclick="saveFood()">儲存食物紀錄</button><button class="btn secondary" type="button"
onclick="resetFoodForm()">清空/取消編輯</button></div></form></div><div class="card"><h2>今日快速總覽</h2><div id="todaySummary" class="summary"></div></div
></section>
 
<section id="foods" class="panel"><div class="card"><h2>每項食物紀錄表</h2><div class="grid4"><div><label>開始日期</label><input type="date" id="foodStart"
onchange="renderFoods(1)"></div><div><label>結束日期</label><input type="date" id="foodEnd" onchange="renderFoods(1)"></div><div><label>餐別</label
><select id="foodMeal" onchange="renderFoods(1)"><option value="">全部</option><option>早餐</option><option>早午餐</option><option>午餐</option
><option>午晚餐</option><option>晚餐</option><option>點心</option><option>宵夜</option><option>飲料</option><option>其他</option></select></div><div
><label>搜尋食物/描述</label><input id="foodSearch" oninput="renderFoods(1)" placeholder="關鍵字"></div></div><div id="foodTableArea"></div></div></section>
 
<section id="fullList" class="panel"><div class="card"><h2>完整食物記錄表清單</h2><div class="grid4"><div><label>搜尋</label><input id="fullSearch"
oninput="renderFullList(1)" placeholder="食物、描述、情境"></div><div><label>特定日期</label><input type="date" id="fullExactDate" onchange="renderFullList(1)"
></div><div><label>月份</label><input type="month" id="fullMonth" onchange="renderFullList(1)"></div><div><label>餐別</label><select id="fullMeal"
onchange="renderFullList(1)"><option value="">全部</option><option>早餐</option><option>早午餐</option><option>午餐</option><option>午晚餐</option
><option>晚餐</option><option>點心</option><option>宵夜</option><option>飲料</option><option>其他</option></select></div><div><label>開始日期</label><input
type="date" id="fullStart" onchange="renderFullList(1)"></div><div><label>結束日期</label><input type="date" id="fullEnd" onchange="renderFullList(1)"
></div><div class="row" style="align-items:end"><button class="btn secondary" onclick="clearFullFilters()">清除篩選</button></div></div><div
id="fullTableArea"></div></div></section>
 
<section id="daily" class="panel"><div class="card"><h2>每日飲食紀錄</h2><div class="grid4"><div><label>日期</label><input type="date" id="dailyDate"
onchange="loadDailyMeta();renderDaily()"></div><div><label>是否有運動</label><select id="exercise"><option value="no">沒有</option><option
value="yes">有</option></select></div><div><label>運動消耗 kcal</label><input type="number" id="exerciseKcal" min="0" step="1"></div><div
><label>有沒有排便</label><select id="bowel"><option value="unknown">未記錄</option><option value="yes">有</option><option value="no">沒有</option></select
></div><div class="full"><label>每日備註</label><textarea id="dailyNote" placeholder="例：今天外食較多、晚餐偏鹹"></textarea></div></div><div class="row"
style="margin-top:12px"><button class="btn green" onclick="saveDailyMeta()">儲存每日補充資料</button></div></div><div class="card"><h2>當天統計與自動總結</h2><div
id="dailyDetail"></div></div></section>
 
<section id="weekly" class="panel"><div class="card"><h2>每週吃的食物列表</h2><div class="grid4"><div><label>選擇週內任一天</label><input type="date" id="weekDate"
onchange="renderWeekly(1)"></div></div><div id="weeklyArea"></div></div></section>
 
<section id="monthly" class="panel"><div class="card"><h2>每月吃的食物列表</h2><div class="grid4"><div><label>月份</label><input type="month" id="monthDate"
onchange="renderMonthly(1)"></div></div><div id="monthlyArea"></div></div></section>
 
<section id="settings" class="panel"><div class="card"><h2>目標設定</h2><div class="grid4"><div><label>熱量綠燈上限 kcal</label><input type="number"
id="setCalGreen"></div><div><label>熱量黃燈上限 kcal</label><input type="number" id="setCalYellow"></div><div><label>蛋白質黃燈門檻 g</label><input type="number"
id="setProteinYellow"></div><div><label>蛋白質綠燈門檻 g</label><input type="number" id="setProteinGreen"></div><div><label>單項蔬菜纖維足夠 g</label><input
type="number" id="setFoodFiber" step="0.1"></div></div><div class="row" style="margin-top:12px"><button class="btn green"
onclick="saveSettings()">儲存設定</button><button class="btn secondary" onclick="restoreDefaults()">恢復預設</button></div></div><div class="card"><h2>備份 /
還原</h2><div id="dataStats" class="note"></div><div class="row" style="margin-top:12px"><button class="btn blue" onclick="exportData()">匯出
JSON</button><label class="btn secondary">匯入 JSON<input type="file" accept="application/json" onchange="importData(event)" style="display:none"
></label><button class="btn danger" onclick="clearAllData()">清空全部資料</button></div></div></section>
</div>
<script>
var KEY='dietTrackerFixedV1';
var PAGE_SIZE=50;
var defaultSettings={calGreen:1100,calYellow:1500,proteinYellow:50,proteinGreen:60,proteinHigh:72,foodFiberEnough:2.5};
var state={foods:[],dailyMeta:{},settings:copy(defaultSettings)};
var pages={foods:1,full:1,weekly:1,monthly:1};
function $(id){return document.getElementById(id)}
function copy(o){return JSON.parse(JSON.stringify(o))}
function today(){return new Date().toISOString().slice(0,10)}
function thisMonth(){return new Date().toISOString().slice(0,7)}
function num(v){var n=Number(v);return isNaN(n)?0:n}
function r1(v){return Math.round(num(v)*10)/10}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function load(){try{var raw=localStorage.getItem(KEY);if(raw){var d=JSON.parse(raw)
;state={foods:(d.foods||[]).map(normalizeFood),dailyMeta:d.dailyMeta||{},settings:Object.assign(copy(defaultSettings),d.settings||{})}}
}catch(e){state={foods:[],dailyMeta:{},settings:copy(defaultSettings)}}}
function persist(){localStorage.setItem(KEY,JSON.stringify(state))}
function normalizeFood(f){var w=num(f.vegWeight), fists=num(f.vegFists)||w/100, vf=num(f.vegFiber)||fists*2.5
;return{id:f.id||uid(),date:f.date||today(),meal:f.meal||'早餐',foodName:f.foodName||'',description:f.description||'',situation:f.situation||'',calories
:num(f.calories),carbs:num(f.carbs),protein:num(f.protein),fat:num(f.fat),sodium:num(f.sodium),vegWeight:w||fists*100,vegFists:fists,vegFiber:vf,photo
:f.photo||'',createdAt:f.createdAt||new Date().toISOString()}}
function showTab(id){var tabs=document.querySelectorAll('.tab');for(var i=0;i<tabs.length
;i++){tabs[i].classList.toggle('active',tabs[i].getAttribute('data-tab')===id)}var panels=document.querySelectorAll('.panel');for(var j=0
;j<panels.length;j++){panels[j].classList.toggle('active',panels[j].id===id)}if(id==='foods')renderFoods(1);if(id==='fullList')renderFullList(1)
;if(id==='daily'){loadDailyMeta();renderDaily()}if(id==='weekly')renderWeekly(1);if(id==='monthly')renderMonthly(1)
;if(id==='settings')renderSettings();window.scrollTo(0,0)}
function init(){load();$('date').value=today();$('dailyDate').value=today();$('weekDate').value=today();$('monthDate').value=thisMonth()
;fillSettings();bindInputs();renderAll();showTab('entry')}
function bindInputs(){$('vegQuick').addEventListener('change',function(){if(this.value==='boiledGreens'){$('vegWeight').value=100;calcVegFromWeight()
}});$('vegWeight').addEventListener('input',calcVegFromWeight);$('vegFists').addEventListener('input',calcVegFromFists)
;$('photo').addEventListener('change',readPhoto)}
function calcVegFromWeight(){var w=num($('vegWeight').value);$('vegFists').value=w?r1(w/100):'';$('vegFiber').value=w?r1(w/100*2.5):''
;$('vegCalcHint').textContent='蔬菜份數：'+(w?r1(w/100):0)+' 份'}
function calcVegFromFists(){var f=num($('vegFists').value);$('vegWeight').value=f?r1(f*100):'';$('vegFiber').value=f?r1(f*2.5):''
;$('vegCalcHint').textContent='蔬菜份數：'+(f?r1(f):0)+' 份'}
function readPhoto(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(){
$('photoData').value=reader.result;$('photoPreview').innerHTML='<img src="'+reader.result+'">'};reader.readAsDataURL(file)}
function resetFoodForm(){$('foodForm').reset();$('editId').value='';$('photoData').value='';$('photoPreview').innerHTML='';$('date').value=today()
;$('vegFiber').value='';$('vegCalcHint').textContent='蔬菜份數：0 份';$('entryTitle').textContent='新增每一項吃的食物'}
function foodFromForm(id){return normalizeFood({id:id||uid(),date:$('date').value||today(),meal:$('meal').value,foodName:$('foodName').value.trim(),de
scription:$('description').value.trim(),situation:$('situation').value.trim(),calories:$('calories').value,carbs:$('carbs').value,protein:$('protein')
.value,fat:$('fat').value,sodium:$('sodium').value,vegWeight:$('vegWeight').value,vegFists:$('vegFists').value,vegFiber:$('vegFiber').value,photo:$('p
hotoData').value,createdAt:new Date().toISOString()})}
function saveFood(){var id=$('editId').value;var old=null;if(id){for(var i=0;i<state.foods.length;i++){if(state.foods[i].id===id){old=state.foods[i]
;break}}}var f=foodFromForm(id||uid());if(old&&!f.photo)f.photo=old.photo;if(!f.foodName){alert('請輸入食物名稱');return}if(id){for(var j=0
;j<state.foods.length;j++){if(state.foods[j].id===id){state.foods[j]=f;break}}}else{state.foods.unshift(f)}persist();resetFoodForm();renderAll()
;alert('已儲存')}
function editFood(id){var f=findFood(id);if(!f)return;showTab('entry');$('editId').value=f.id;$('date').value=f.date;$('meal').value=f.meal
;$('foodName').value=f.foodName;$('description').value=f.description;$('situation').value=f.situation;$('calories').value=f.calories||''
;$('carbs').value=f.carbs||'';$('protein').value=f.protein||'';$('fat').value=f.fat||'';$('sodium').value=f.sodium||''
;$('vegWeight').value=f.vegWeight||'';$('vegFists').value=f.vegFists||'';$('vegFiber').value=f.vegFiber||'';$('photoData').value=f.photo||''
;$('photoPreview').innerHTML=f.photo?'<img src="'+f.photo+'">':'';$('vegCalcHint').textContent='蔬菜份數：'+r1(num(f.vegWeight)/100)+' 份'
;$('entryTitle').textContent='編輯食物紀錄'}
function deleteFood(id){if(confirm('確定刪除此筆食物紀錄？')){state.foods=state.foods.filter(function(f){return f.id!==id});persist();renderAll()}}
function copyFood(id){var f=findFood(id);if(!f)return;var n=copy(f);n.id=uid();n.date=today();n.createdAt=new Date().toISOString()
;n.foodName=n.foodName+'（複製）';state.foods.unshift(n);persist();renderAll();alert('已複製')}
function findFood(id){for(var i=0;i<state.foods.length;i++){if(state.foods[i].id===id)return state.foods[i]}return null}
function sortedFoods(){return state.foods.slice().sort(function(a,b){return
String(b.date).localeCompare(String(a.date))||String(b.createdAt).localeCompare(String(a.createdAt))})}
function filteredBasic(prefix){var arr=sortedFoods();var q=($(prefix+'Search')?$(prefix+'Search').value:'').toLowerCase().trim();var
st=$(prefix+'Start')?$(prefix+'Start').value:'';var en=$(prefix+'End')?$(prefix+'End').value:'';var meal=$(prefix+'Meal')?$(prefix+'Meal').value:''
;if(q)arr=arr.filter(function(f){return (f.foodName+' '+f.description+' '+f.situation).toLowerCase().indexOf(q)>-1})
;if(st)arr=arr.filter(function(f){return f.date>=st});if(en)arr=arr.filter(function(f){return f.date<=en});if(meal)arr=arr.filter(function(f){return
f.meal===meal});return arr}
function filteredFull(){var arr=sortedFoods();var q=$('fullSearch').value.toLowerCase().trim(), exact=$('fullExactDate').value,
mon=$('fullMonth').value, st=$('fullStart').value, en=$('fullEnd').value, meal=$('fullMeal').value;if(q)arr=arr.filter(function(f){return
(f.foodName+' '+f.description+' '+f.situation).toLowerCase().indexOf(q)>-1});if(exact)arr=arr.filter(function(f){return f.date===exact})
;if(mon)arr=arr.filter(function(f){return f.date.indexOf(mon)===0});if(st)arr=arr.filter(function(f){return f.date>=st})
;if(en)arr=arr.filter(function(f){return f.date<=en});if(meal)arr=arr.filter(function(f){return f.meal===meal});return arr}
function paginate(rows,page){var pages=Math.max(1,Math.ceil(rows.length/PAGE_SIZE));page=Math.min(Math.max(1,page||1),pages)
;return{rows:rows.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE),page:page,pages:pages,total:rows.length}}
function pager(p,fn){return '<div class="pager"><div class="pagerInfo">共 '+p.total+' 筆｜第 '+p.page+'/'+p.pages+' 頁｜每頁 '+PAGE_SIZE+' 筆</div><div
class="row"><button class="btn small secondary" onclick="'+fn+'('+Math.max(1,p.page-1)+')">上一頁</button><button class="btn small secondary"
onclick="'+fn+'('+Math.min(p.pages,p.page+1)+')">下一頁</button></div></div>'}
function renderFoods(page){pages.foods=page;var p=paginate(filteredBasic('food'),page)
;$('foodTableArea').innerHTML=pager(p,'renderFoods')+foodTable(p.rows)+pager(p,'renderFoods')}
function renderFullList(page){pages.full=page;var p=paginate(filteredFull(),page)
;$('fullTableArea').innerHTML=pager(p,'renderFullList')+foodTable(p.rows)+pager(p,'renderFullList')}
function clearFullFilters(){['fullSearch','fullExactDate','fullMonth','fullStart','fullEnd','fullMeal'].forEach(function(id){$(id).value=''})
;renderFullList(1)}
function foodTable(rows){if(!rows.length)return '<div class="empty">目前沒有符合條件的紀錄</div>';var html='<div class="scrollHint">表格可左右滑動</div><div
class="tableWrap"><table><tr><th>日期</th><th>餐別</th><th>食物</th><th>描述/情況</th><th>熱量</th><th>碳/蛋白/脂肪</th><th>鈉</th><th>蔬菜</th><th>照片</th><th>操作</th
></tr>';for(var i=0;i<rows.length;i++){var f=rows[i];html+='<tr><td>'+esc(f.date)+'</td><td>'+esc(f.meal)+'</td><td><b>'+esc(f.foodName)+'</b><br
><span class="pill '+(f.vegFiber>=state.settings.foodFiberEnough?'ok':'warn')+'">蔬菜纖維 '+r1(f.vegFiber)+'g</span></td><td>'+esc(f.description)+'<br
><span class="hint">'+esc(f.situation)+'</span></td><td>'+r1(f.calories)+' kcal</td><td>'+r1(f.carbs)+' / '+r1(f.protein)+' / '+r1(f.fat)+'g</td
><td>'+r1(f.sodium)+' mg</td><td>'+r1(f.vegWeight)+'g<br>'+r1(f.vegFists)+'拳<br>'+r1(f.vegFiber)+'g纖維</td><td>'+(f.photo?'<img class="foodpic"
src="'+f.photo+'">':'')+'</td><td><button class="btn small blue" onclick="editFood(\''+f.id+'\')">編輯</button> <button class="btn small secondary"
onclick="copyFood(\''+f.id+'\')">複製</button> <button class="btn small danger" onclick="deleteFood(\''+f.id+'\')">刪除</button></td></tr>'}return
html+'</table></div>'}
function totals(date){var items=state.foods.filter(function(f){return f.date===date});var
t={items:items,calories:0,carbs:0,protein:0,fat:0,sodium:0,vegWeight:0,vegFists:0,vegFiber:0}
;items.forEach(function(f){['calories','carbs','protein','fat','sodium','vegWeight','vegFists','vegFiber'].forEach(function(k){t[k]+=num(f[k])})})
;return t}
function calStatus(v){v=num(v);return v<=state.settings.calGreen?'💚':v<=state.settings.calYellow?'💛':'❤'}
function proteinStatus(v){v=num(v);return v>state.settings.proteinGreen&&v<=state.settings.proteinHigh?'🟢':v>state.settings.proteinYellow&&v<=state.se
ttings.proteinGreen?'🟡':'🔴'}
function vegStatus(v){v=num(v);return v<300?'不足':v<500?'基本':'理想'}
function vegFiberStatus(v){v=num(v);return v<7.5?'不足':v<12.5?'基本':'理想'}
function statusClass(s){return s==='理想'?'greenText':s==='基本'?'amberText':'redText'}
function summaryHtml(t){return '<div class="metric"><div class="k">熱量</div><div class="v">'+r1(t.calories)+'</div><div class="hint">kcal
'+calStatus(t.calories)+'</div></div><div class="metric"><div class="k">蛋白質</div><div class="v">'+r1(t.protein)+'g</div><div
class="hint">'+proteinStatus(t.protein)+'</div></div><div class="metric"><div class="k">蔬菜</div><div class="v">'+r1(t.vegWeight)+'g</div><div
class="hint '+statusClass(vegStatus(t.vegWeight))+'">'+vegStatus(t.vegWeight)+'</div></div><div class="metric"><div class="k">蔬菜纖維</div><div
class="v">'+r1(t.vegFiber)+'g</div><div class="hint '+statusClass(vegFiberStatus(t.vegFiber))+'">'+vegFiberStatus(t.vegFiber)+'</div></div><div
class="metric"><div class="k">碳水</div><div class="v">'+r1(t.carbs)+'g</div></div><div class="metric"><div class="k">脂肪</div><div
class="v">'+r1(t.fat)+'g</div></div><div class="metric"><div class="k">鈉</div><div class="v">'+r1(t.sodium)+'</div><div class="hint">mg</div></div
><div class="metric"><div class="k">蔬菜拳頭</div><div class="v">'+r1(t.vegFists)+'</div><div class="hint">拳</div></div>'}
function renderToday(){$('todaySummary').innerHTML=summaryHtml(totals(today()))}
function saveDailyMeta(){var d=$('dailyDate').value||today()
;state.dailyMeta[d]={exercise:$('exercise').value,exerciseKcal:num($('exerciseKcal').value),bowel:$('bowel').value,note:$('dailyNote').value}
;persist();renderDaily();alert('已儲存每日補充資料')}
function loadDailyMeta(){var d=$('dailyDate').value||today();var m=state.dailyMeta[d]||{};$('exercise').value=m.exercise||'no'
;$('exerciseKcal').value=m.exerciseKcal||'';$('bowel').value=m.bowel||'unknown';$('dailyNote').value=m.note||''}
function renderDaily(){var d=$('dailyDate').value||today();var t=totals(d);var m=state.dailyMeta[d]||{};var meals=[].concat.apply([],
[t.items.map(function(f){return f.meal})]).filter(function(v,i,a){return a.indexOf(v)===i}).join('、')||'尚無';var
foodNames=t.items.map(function(f){return f.foodName}).join('、')||'尚無';var vs=vegStatus(t.vegWeight),vfs=vegFiberStatus(t.vegFiber);var assess='熱量
'+calStatus(t.calories)+'；蛋白質 '+proteinStatus(t.protein)+'；蔬菜攝取狀態：'+vs+'；蔬菜纖維：'+vfs+'；'+(m.bowel==='no'?'今日未排便，可留意水分與蔬菜。':m.bowel==='yes'?'今日有排便。':'排
便未記錄。');$('dailyDetail').innerHTML='<div class="summary">'+summaryHtml(t)+'</div><div class="note" style="margin-top:12px">今日蔬菜：約 '+r1(t.vegWeight)+'
g<br>今日蔬菜：約 '+r1(t.vegFists)+' 拳<br>蔬菜提供纖維：約 '+r1(t.vegFiber)+' g<br>蔬菜攝取狀態：<b class="'+statusClass(vs)+'">'+vs+'</b></div><h3>當天完整欄位</h3><div
class="chips"><span class="chip">餐別：'+esc(meals)+'</span><span class="chip">總共吃了：'+esc(foodNames)+'</span><span
class="chip">運動：'+(m.exercise==='yes'?'有，消耗 '+num(m.exerciseKcal)+' kcal':'沒有')+'</span><span
class="chip">排便：'+(m.bowel==='yes'?'有':m.bowel==='no'?'沒有':'未記錄')+'</span></div><h3>自動當天營養總結評估</h3><div
class="note">'+assess+(m.note?'<br>備註：'+esc(m.note):'')+'</div><h3>當天食物明細</h3>'+foodTable(t.items)}
function startOfWeek(dateStr){var d=new Date((dateStr||today())+'T00:00:00');var day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d}
function fmt(d){return d.toISOString().slice(0,10)}
function dayCard(d){var t=totals(d),m=state.dailyMeta[d]||{};return '<div class="dayitem"><div class="daytop"><b>'+d+'</b><span
class="hint">'+t.items.length+' 筆</span></div><div class="chips"><span class="chip">熱量 '+r1(t.calories)+' '+calStatus(t.calories)+'</span><span
class="chip">蛋白 '+r1(t.protein)+'g '+proteinStatus(t.protein)+'</span><span class="chip">蔬菜 '+r1(t.vegWeight)+'g / '+r1(t.vegFists)+'拳</span><span
class="chip">蔬菜纖維 '+r1(t.vegFiber)+'g</span><span class="chip">排便 '+(m.bowel==='yes'?'有':m.bowel==='no'?'沒有':'未記錄')+'</span></div><div class="hint"
style="margin-top:8px">食物：'+esc(t.items.map(function(i){return i.foodName}).join('、')||'尚無')+'</div></div>'}
function renderWeekly(page){var s=startOfWeek($('weekDate').value||today());var days=[];for(var i=0;i<7;i++){var d=new Date(s)
;d.setDate(s.getDate()+i);days.push(fmt(d))}var p=paginate(days,page||1)
;$('weeklyArea').innerHTML=pager(p,'renderWeekly')+p.rows.map(dayCard).join('')+pager(p,'renderWeekly')}
function renderMonthly(page){var mon=$('monthDate').value||thisMonth();var parts=mon.split('-'),y=Number(parts[0]),m=Number(parts[1]);var last=new
Date(y,m,0).getDate();var days=[];for(var d=1;d<=last;d++)days.push(mon+'-'+String(d).padStart(2,'0'));var p=paginate(days,page||1)
;$('monthlyArea').innerHTML=pager(p,'renderMonthly')+p.rows.map(dayCard).join('')+pager(p,'renderMonthly')}
function fillSettings(){var s=state.settings;$('setCalGreen').value=s.calGreen;$('setCalYellow').value=s.calYellow
;$('setProteinYellow').value=s.proteinYellow;$('setProteinGreen').value=s.proteinGreen;$('setFoodFiber').value=s.foodFiberEnough}
function saveSettings(){state.settings.calGreen=num($('setCalGreen').value);state.settings.calYellow=num($('setCalYellow').value)
;state.settings.proteinYellow=num($('setProteinYellow').value);state.settings.proteinGreen=num($('setProteinGreen').value)
;state.settings.foodFiberEnough=num($('setFoodFiber').value);persist();renderAll();alert('設定已儲存')}
function restoreDefaults(){state.settings=copy(defaultSettings);fillSettings();persist();renderAll()}
function renderSettings(){fillSettings();renderStats()}
function renderStats(){var dates=[];state.foods.forEach(function(f){if(dates.indexOf(f.date)<0)dates.push(f.date)})
;$('dataStats').innerHTML='食物紀錄：'+state.foods.length+' 筆<br>有紀錄的日期：'+dates.length+' 天<br>每日補充資料：'+Object.keys(state.dailyMeta).length+' 天'}
function exportData(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a')
;a.href=URL.createObjectURL(blob);a.download='diet-tracker-backup-'+today()+'.json';a.click();URL.revokeObjectURL(a.href)}
function importData(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(){try{var
d=JSON.parse(reader.result);state={foods:(d.foods||[]).map(normalizeFood),dailyMeta:d.dailyMeta||{
},settings:Object.assign(copy(defaultSettings),d.settings||{})};persist();fillSettings();renderAll();alert('匯入完成')}catch(err){alert('JSON 格式不正確')}}
;reader.readAsText(file)}
function clearAllData(){if(confirm('確定清空全部資料？此動作無法復原，建議先匯出備份。')){state={foods:[],dailyMeta:{},settings:copy(defaultSettings)};persist()
;fillSettings();renderAll()}}
function renderAll(){renderToday();renderFoods(pages.foods);renderFullList(pages.full);loadDailyMeta();renderDaily();renderWeekly(pages.weekly)
;renderMonthly(pages.monthly);renderStats()}
init();
</script>
</body>
</html>
